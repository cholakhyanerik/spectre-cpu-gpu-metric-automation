    { name = "matplotlib" },
    { name = "psutil" },
    { name = "pyautogui" },
    { name = "pytest" },
    { name = "pytest-html" },
    { name = "python-dotenv" },
    { name = "setuptools" },
]

[package.metadata]
requires-dist = [
    { name = "gputil", specifier = ">=1.4.0" },
    { name = "matplotlib", specifier = ">=3.10.8" },
    { name = "psutil", specifier = ">=7.2.2" },
    { name = "pyautogui", specifier = ">=0.9.54" },
    { name = "pytest", specifier = ">=9.0.2" },
    { name = "pytest-html", specifier = ">=4.2.0" },
    { name = "python-dotenv", specifier = ">=1.2.2" },
    { name = "setuptools", specifier = ">=82.0.1" },
]
